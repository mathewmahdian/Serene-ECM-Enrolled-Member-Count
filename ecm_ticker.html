<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECM Enrolled Members — Serene Health</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:       #212F64;
      --navy-seal:  #303C98;
      --blue:       #2196F3;
      --cyan:       #00D4FF;
      --white:      #FFFFFF;
      --ivory:      #F5F6FA;
      --saffron:    #F4A833;
      --dim:        rgba(255,255,255,0.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--navy);
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Background layers ── */
    .bg-radial {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 50%, rgba(33,150,243,.18) 0%, transparent 70%),
        radial-gradient(ellipse 110% 90% at 50% 100%, rgba(0,212,255,.08) 0%, transparent 60%);
    }

    .dot-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.07) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* ── Scan-line shimmer ── */
    @keyframes scan {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(200%); }
    }
    .scanline {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      overflow: hidden;
    }
    .scanline::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to bottom, transparent, rgba(0,212,255,.04), transparent);
      animation: scan 4s ease-in-out infinite;
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      gap: 0;
      padding: 56px 72px 48px;
      border-radius: 24px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(0,212,255,.18);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.06) inset,
        0 32px 80px rgba(0,0,0,.55),
        0 0 120px rgba(0,212,255,.08);
      backdrop-filter: blur(12px);
      text-align: center;
      min-width: 520px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp .6s ease forwards .1s;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo strip ── */
    .logo-strip {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp .5s ease forwards .3s;
    }
    .logo-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: conic-gradient(var(--blue) 0deg 120deg, var(--cyan) 120deg 240deg, var(--navy-seal) 240deg 360deg);
      box-shadow: 0 0 14px rgba(0,212,255,.5);
    }
    .logo-text {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 15px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--dim);
    }
    .logo-text span { font-weight: 600; color: rgba(255,255,255,.85); }

    /* ── Label ── */
    .label-top {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 11.5px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeUp .5s ease forwards .45s;
    }

    /* ── The big number ── */
    .counter-wrap {
      position: relative;
      margin-bottom: 8px;
    }
    .counter {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(96px, 18vw, 148px);
      line-height: 1;
      background: linear-gradient(135deg, #ffffff 10%, #a8d8ff 50%, var(--cyan) 90%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: .02em;
      text-shadow: none;
      filter: drop-shadow(0 0 40px rgba(0,212,255,.35));
      opacity: 0;
      animation: fadeUp .5s ease forwards .55s;
      min-width: 7ch;
      display: inline-block;
    }

    /* Glow pulse when counter finishes */
    @keyframes glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 40px rgba(0,212,255,.35)); }
      50%       { filter: drop-shadow(0 0 80px rgba(0,212,255,.75)); }
    }
    .counter.done {
      animation: fadeUp .5s ease forwards .55s, glow-pulse 2s ease-in-out infinite 1s;
    }

    /* ── Separator ── */
    .sep {
      width: 72px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      margin: 16px auto 18px;
      border-radius: 2px;
      opacity: 0;
      animation: fadeUp .4s ease forwards .65s;
    }

    /* ── Sub-label ── */
    .label-main {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 15px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.78);
      margin-bottom: 6px;
      opacity: 0;
      animation: fadeUp .5s ease forwards .7s;
    }
    .label-sub {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 12.5px;
      letter-spacing: .1em;
      color: rgba(255,255,255,.38);
      opacity: 0;
      animation: fadeUp .5s ease forwards .8s;
    }

    /* ── Progress bar ── */
    .progress-row {
      width: 100%;
      margin-top: 32px;
      opacity: 0;
      animation: fadeUp .5s ease forwards .85s;
    }
    .progress-track {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,.1);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--navy-seal), var(--blue), var(--cyan));
      box-shadow: 0 0 12px rgba(0,212,255,.6);
      transition: width 0.05s linear;
    }
    .progress-labels {
      display: flex; justify-content: space-between;
      margin-top: 8px;
    }
    .progress-labels span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,.28);
      letter-spacing: .05em;
    }

    /* ── Replay button ── */
    .replay-btn {
      display: flex; align-items: center; gap: 8px;
      margin-top: 28px;
      padding: 10px 24px;
      border-radius: 40px;
      background: transparent;
      border: 1px solid rgba(0,212,255,.3);
      color: rgba(255,255,255,.55);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, border-color .2s, color .2s, box-shadow .2s;
      opacity: 0;
      animation: fadeUp .4s ease forwards 1.2s;
    }
    .replay-btn:hover {
      background: rgba(0,212,255,.1);
      border-color: rgba(0,212,255,.7);
      color: var(--cyan);
      box-shadow: 0 0 18px rgba(0,212,255,.2);
    }
    .replay-btn:active {
      transform: scale(.96);
    }
    .replay-icon {
      display: inline-block;
      transition: transform .4s ease;
    }
    .replay-btn:hover .replay-icon {
      transform: rotate(-360deg);
    }

    /* ── Badge: "LIVE" ── */
    .badge {
      position: absolute;
      top: 22px; right: 22px;
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      background: rgba(244,168,51,.12);
      border: 1px solid rgba(244,168,51,.4);
      font-size: 10px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--saffron);
    }
    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: .2; }
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--saffron);
      animation: blink 1.4s ease infinite;
    }
  </style>
</head>
<body>

  <div class="bg-radial"></div>
  <div class="dot-grid"></div>
  <div class="scanline"></div>

  <div class="card">

    <div class="badge"><span class="badge-dot"></span> Live</div>

    <div class="logo-strip">
      <div class="logo-dot"></div>
      <div class="logo-text"><span>serene</span> Health Group</div>
    </div>

    <div class="label-top">Enhanced Care Management</div>

    <div class="counter-wrap">
      <div class="counter" id="counter">0</div>
    </div>

    <div class="sep"></div>

    <div class="label-main">Total Enrolled Members</div>
    <div class="label-sub">As of June 9, 2026 · 4:00 PM</div>

    <div class="progress-row">
      <div class="progress-track">
        <div class="progress-fill" id="progress"></div>
      </div>
      <div class="progress-labels">
        <span>0</span>
        <span>10,011</span>
      </div>
    </div>

    <button class="replay-btn" id="replayBtn" onclick="replay()">
      <span class="replay-icon">↺</span> Replay
    </button>

  </div>

  <script>
    const TARGET   = 10011;
    const DURATION = 1800;
    const el       = document.getElementById('counter');
    const bar      = document.getElementById('progress');
    const btn      = document.getElementById('replayBtn');

    let running    = false;
    let rafId      = null;

    function easeOutExpo(t) {
      return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
    }

    function formatNumber(n) {
      return n.toLocaleString('en-US');
    }

    function startCount() {
      if (running) return;
      running = true;
      btn.disabled = true;
      btn.style.opacity = '0.35';
      el.classList.remove('done');

      let startTime = null;

      function tick(ts) {
        if (!startTime) startTime = ts;
        const elapsed  = ts - startTime;
        const progress = Math.min(elapsed / DURATION, 1);
        const eased    = easeOutExpo(progress);
        const value    = Math.round(eased * TARGET);

        el.textContent  = formatNumber(value);
        bar.style.width = (eased * 100).toFixed(2) + '%';

        if (progress < 1) {
          rafId = requestAnimationFrame(tick);
        } else {
          el.textContent   = formatNumber(TARGET);
          bar.style.width  = '100%';
          el.classList.add('done');
          running          = false;
          btn.disabled     = false;
          btn.style.opacity = '1';
        }
      }

      rafId = requestAnimationFrame(tick);
    }

    function replay() {
      if (rafId) cancelAnimationFrame(rafId);
      running = false;
      el.classList.remove('done');
      el.textContent  = '0';
      bar.style.width = '0%';
      // tiny pause so the reset is visible before re-running
      setTimeout(startCount, 120);
    }

    // Auto-start after card fade-in
    setTimeout(startCount, 700);
  </script>
</body>
</html>
